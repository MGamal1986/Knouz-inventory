services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: ${TZ:-Africa/Cairo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: ${PORT}
      TZ: ${TZ:-Africa/Cairo}
    volumes:
      - uploads:/app/uploads
      - invoices:/app/invoices
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    environment:
      # Vite dev server target for its /api, /uploads, /invoices proxy.
      # Uses the docker network service name so browser traffic stays
      # same-origin (localhost:3000) for the httpOnly auth cookies.
      VITE_API_PROXY_TARGET: http://api:4000
    volumes:
      # Bind-mount source so Vite's dev server picks up local edits live.
      # node_modules stays in the image (anonymous volume) so it isn't
      # shadowed by the host bind mount.
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
  invoices:
